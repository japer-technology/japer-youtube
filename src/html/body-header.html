<div id="app">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="app-header__brand">
      <!-- YouTube-style play icon -->
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.58 7.19A2.5 2.5 0 0 0 19.82 5.4C18.25 5 12 5 12 5s-6.25 0-7.82.4A2.5 2.5 0 0 0 2.42 7.19 26.2 26.2 0 0 0 2 12a26.2 26.2 0 0 0 .42 4.81 2.5 2.5 0 0 0 1.76 1.79C5.75 19 12 19 12 19s6.25 0 7.82-.4a2.5 2.5 0 0 0 1.76-1.79A26.2 26.2 0 0 0 22 12a26.2 26.2 0 0 0-.42-4.81zM10 15.5V8.5l5.5 3.5-5.5 3.5z"/></svg>
      <span>Japer YouTube</span>
    </div>

    <div class="app-header__actions">
      <div class="search-bar">
        <input id="search-input" class="search-bar__input" type="text" placeholder="Search videos…" aria-label="Search videos">
        <button id="search-btn" class="search-bar__btn" aria-label="Search">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
      </div>
      <button id="btn-save-session" class="btn-save-session" style="display:none" aria-label="Save session">Save</button>
      <button id="btn-disconnect" class="btn-disconnect" style="display:none" aria-label="Disconnect">Disconnect</button>
    </div>
  </header>
